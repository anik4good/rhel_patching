---
# TC-RHEL-004: Post-Patch Validation Failure - Service Not Running
# This scenario demonstrates validation that detects when a service fails
# after patch installation, preventing false "success" status.

- name: ===========================================
  ansible.builtin.debug:
    msg: "RHEL PATCHING POC - POST-VALIDATION FAILURE SCENARIO (TC-RHEL-004)"

- name: Display target server information
  ansible.builtin.debug:
    msg:
    - "=========================================="
    - "  PATCHING: {{ inventory_hostname }}"
    - "=========================================="
    - "OS: {{ ansible_distribution }} {{ ansible_distribution_version }}"
    - "IP: {{ ansible_default_ipv4.address | default(ansible_hostname) }}"
    - "Testing: Real patching + config corruption → service fails"

# ========================================
# PRE-CHECK PHASE
# ========================================
- name: ===========================================
  ansible.builtin.debug:
    msg: "PHASE 1: PRE-CHECK VALIDATION"

- name: Check sufficient disk space
  ansible.builtin.shell: df / | tail -1 | awk '{print $5}' | sed 's/%//'
  register: disk_usage
  changed_when: false
  failed_when: disk_usage.stdout|int > 90

- name: Display disk usage status
  ansible.builtin.debug:
    msg: "✓ Disk space check passed: {{ disk_usage.stdout }}% used"

- name: Verify repository accessible
  ansible.builtin.command: dnf repolist
  register: repo_check
  failed_when: repo_check.rc != 0
  changed_when: false

- name: Display repository status
  ansible.builtin.debug:
    msg: "✓ Repository accessible"

# ========================================
# REPOSITORY SWITCH PHASE (Optional - 9.4 → 9.7)
# ========================================
- name: ===========================================
  ansible.builtin.debug:
    msg: "PHASE 1.5: REPOSITORY SWITCH (9.4 → 9.7)"

- name: Check if custom 9.4/9.7 repos are configured
  ansible.builtin.shell: |
    grep -q "rhel-9\.[47]" /etc/yum.repos.d/*.repo 2>/dev/null && echo "found" || echo "not_found"
  register: custom_repos_check
  changed_when: false

- name: Display current repository configuration
  ansible.builtin.shell: dnf repolist
  register: current_repos
  changed_when: false

- name: Show current enabled repos
  ansible.builtin.debug:
    msg: "Current repos:

      {{ current_repos.stdout }}"

- name: Disable RHEL 9.4 repositories (if custom repos configured)
  ansible.builtin.command: dnf config-manager --set-disabled rhel-9.4-*
  register: disable_94
  failed_when: false
  changed_when: false
  when: custom_repos_check.stdout == "found"

- name: Enable RHEL 9.7 repositories (if custom repos configured)
  ansible.builtin.command: dnf config-manager --set-enabled rhel-9.7-*
  register: enable_97
  failed_when: false
  changed_when: false
  when: custom_repos_check.stdout == "found"

- name: Display repository switch result
  ansible.builtin.debug:
    msg: "{% if custom_repos_check.stdout == 'found' %}✓ Repository switch completed (9.4 → 9.7){% else %}⚠ Using default repositories (no 9.4/9.7 repos configured){% endif %}"

- name: Clean DNF cache after repo switch
  ansible.builtin.command: dnf clean all
  changed_when: false

# ========================================
# BACKUP PHASE
# ========================================
- name: ===========================================
  ansible.builtin.debug:
    msg: "PHASE 2: BACKUP CREATION"

- name: Create backup directory
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0755'

- name: Backup current package and config
  ansible.builtin.shell: |
    if rpm -q {{ package_name }} >/dev/null 2>&1; then
      find /var/lib/rpm -name "{{ package_name }}-*.rpm" -exec cp {} {{ backup_dir }}/ \;
      # Backup nginx config for potential rollback
      cp -f /etc/{{ package_name }}/{{ package_name }}.conf {{ backup_dir }}/ 2>/dev/null || true
      echo "Backup created"
    else
      echo "Package not installed, no backup needed"
    fi
  register: backup_result
  changed_when: "'Backup created' in backup_result.stdout"

- name: Display backup status
  ansible.builtin.debug:
    msg: "✓ Backup created at {{ backup_dir }}/"

# ========================================
# VERSION CHECK (BEFORE PATCH)
# ========================================
- name: ===========================================
  ansible.builtin.debug:
    msg: "PHASE 2.5: VERSION CHECK - BEFORE PATCH"

- name: Get current package version
  ansible.builtin.shell: rpm -q {{ package_name }} 2>/dev/null || echo "NOT_INSTALLED"
  register: current_version_check
  changed_when: false

- name: Display current version
  ansible.builtin.debug:
    msg:
    - "=========================================="
    - "  CURRENT STATE (BEFORE PATCH)"
    - "=========================================="
    - "Package: {{ package_name }}"
    - "Version: {{ current_version_check.stdout }}"
    - "Status: {% if 'NOT_INSTALLED' in current_version_check.stdout %}Not installed{% else %}Installed{% endif %}"
    - "=========================================="

# ========================================
# PATCHING PHASE (Actually Patches - Succeeds)
# ========================================
- name: ===========================================
  ansible.builtin.debug:
    msg: "PHASE 3: PACKAGE PATCHING (UPGRADE)"

- name: Display patching information
  ansible.builtin.debug:
    msg:
    - "=========================================="
    - "  PATCHING DETAILS"
    - "=========================================="
    - "Before: {{ current_version_check.stdout }}"
    - "Target: Latest available {{ package_name }}"
    - "Action: UPGRADE"
    - "=========================================="

- name: Patch package to latest available version
  block:
  - name: Upgrade package to latest available
    ansible.builtin.dnf:
      name: "{{ package_name }}"
      state: latest # Gets latest available from enabled repos
      disable_gpg_check: true
    register: patch_result

  - name: Display patching result
    ansible.builtin.debug:
      msg:
      - "✓ Patching completed"
      - "Changed: {{ patch_result.changed }}"
      - "Changes: {{ patch_result.changes | default([]) | length }} updates"

  rescue:
  - name: Patching failure handler
    ansible.builtin.debug:
      msg:
      - "=========================================="
      - "  PATCHING FAILED"
      - "=========================================="
      - "Error: {{ patch_result.msg | default('Unknown error') }}"
      - "Action: Rescue block activated"
      - "Backup preserved: Yes"
      - "=========================================="

  - name: Mark host as failed
    ansible.builtin.set_fact:
      patch_status: "patching_failed"

  - name: Stop execution
    meta: end_play

  always:
  - name: Log patching attempt
    ansible.builtin.lineinfile:
      path: "{{ log_file }}"
      line: "{{ ansible_date_time.iso8601 }} - Patch attempt: {{ package_name }} {{ current_version_check.stdout }} → latest"
      create: true

# ========================================
# VERSION CHECK (AFTER PATCH)
# ========================================
- name: ===========================================
  ansible.builtin.debug:
    msg: "PHASE 3.5: VERSION CHECK - AFTER PATCH"

- name: Get new package version
  ansible.builtin.shell: rpm -q {{ package_name }}
  register: new_version_check
  changed_when: false

- name: Display new version
  ansible.builtin.debug:
    msg:
    - "=========================================="
    - "  NEW STATE (AFTER PATCH)"
    - "=========================================="
    - "Package: {{ package_name }}"
    - "Version: {{ new_version_check.stdout }}"
    - "Status: Installed"
    - "=========================================="

- name: Display version comparison
  ansible.builtin.debug:
    msg:
    - "=========================================="
    - "  PATCH SUMMARY"
    - "=========================================="
    - "Before: {{ current_version_check.stdout }}"
    - "After:  {{ new_version_check.stdout }}"
    - "Change:  {% if current_version_check.stdout != new_version_check.stdout %}VERSION CHANGED✓{% else %}No change{% endif %}"
    - "Status:  PATCHED SUCCESSFULLY"
    - "=========================================="

- name: Set installation facts
  ansible.builtin.set_fact:
    package_installed: true
    installed_version: "{{ new_version_check.stdout }}"

# ========================================
# CONFIG CORRUPTION (Break the service)
# ========================================
- name: ===========================================
  ansible.builtin.debug:
    msg: "⚠ DEMONSTRATION: Corrupting nginx config to cause service failure"

- name: Backup original config
  ansible.builtin.shell:
    cmd: cp /etc/{{ package_name }}/{{ package_name }}.conf {{ backup_dir }}/{{ package_name }}.conf.backup
  failed_when: false

- name: Corrupt nginx configuration (add invalid directive)
  ansible.builtin.blockinfile:
    path: "/etc/{{ package_name }}/{{ package_name }}.conf"
    block: |
      # INVALID CONFIGURATION - ADDED FOR DEMONSTRATION
      invalid_directive_this_will_fail;
      listen 8888;  # Wrong port
    marker: "# {mark} ANSIBLE MANAGED BLOCK - CORRUPTED CONFIG"
    insertafter: EOF
  register: config_corruption

- name: Display corruption action
  ansible.builtin.debug:
    msg:
    - "⚠ Configuration file corrupted"
    - "Added invalid directive to {{ package_name }}.conf"
    - "This will prevent service from starting"

# ========================================
# POST-VALIDATION PHASE - WILL FAIL HERE
# ========================================
- name: ===========================================
  ansible.builtin.debug:
    msg: "PHASE 4: POST-VALIDATION"

- name: ===========================================
  ansible.builtin.debug:
    msg: "⚠ POST-PATCH: Checking if service can start with new config"

- name: Attempt to start the service (will fail due to corrupted config)
  block:
  - name: Stop service first (to ensure clean state)
    ansible.builtin.systemd:
      name: "{{ package_name }}"
      state: stopped
    failed_when: false

  - name: Try to start the service
    ansible.builtin.systemd:
      name: "{{ package_name }}"
      state: started
    register: service_start_result
    failed_when: false

  - name: Check actual service status
    ansible.builtin.shell: systemctl is-active {{ package_name }}
    register: service_status
    changed_when: false

  - name: Display service status
    ansible.builtin.debug:
      msg: "Service status: {{ service_status.stdout }}"

  - name: Validate service is running
    ansible.builtin.fail:
      msg: "Service validation failed: {{ package_name }} is {{ service_status.stdout }}"
    when: service_status.stdout != "active"

  - name: Service validation passed (should not reach here)
    ansible.builtin.debug:
      msg: "✓ Service is running (unexpected in this scenario)"
    when: service_status.stdout == "active"

  rescue:
  - name: ===========================================
    ansible.builtin.debug:
      msg: "⚠ VALIDATION FAILURE DETECTED"

  - name: Mark as validation failure
    ansible.builtin.set_fact:
      patch_status: "validation_failed"
      service_name: "{{ package_name }}"
      expected_state: "active"
      actual_state: "{{ service_status.stdout }}"

  - name: Display validation failure
    ansible.builtin.debug:
      msg:
      - "=========================================="
      - "  POST-PATCH VALIDATION FAILED"
      - "=========================================="
      - "Package: {{ package_name }}-{{ installed_version }}"
      - "Installation: SUCCESS ✓"
      - ""
      - "Service: {{ service_name }}"
      - "Expected State: active"
      - "Actual State: {{ actual_state }}"
      - ""
      - "ROOT CAUSE: Config file corrupted during patch"
      - "This demonstrates post-patch validation catching issues"
      - ""
      - "ACTION: Marked as validation failure"
      - "Backup preserved for rollback"
      - "=========================================="

  - name: Generate validation failure report
    ansible.builtin.copy:
      content: |
        Post-Patch Validation Failure Report
        =====================================
        Date: {{ ansible_date_time.iso8601 }}
        Server: {{ inventory_hostname }}

        Patch Status: VALIDATION_FAILED

        Patch Information:
        - Package: {{ package_name }}-{{ installed_version }}
        - Installation: SUCCESS
        - Previous Version: {{ current_version_check.stdout }}

        Service Validation:
        - Service: {{ service_name }}
        - Expected State: {{ expected_state }}
        - Actual State: {{ actual_state }}
        - Status: FAILED

        Root Cause:
        Configuration file was intentionally corrupted to demonstrate
        post-patch validation. In real scenarios, this could be:
        - Configuration file overwritten by patch
        - Dependency incompatibility
        - Permission problem
        - Port conflict

        Demonstration:
        This scenario shows that even when package installation succeeds,
        the playbook validates that services actually start. This prevents
        false "success" reports when patching breaks functionality.

        Rollback Options:
        1. Restore config: cp {{ backup_dir }}/{{ package_name }}.conf.backup /etc/{{ package_name }}/{{ package_name }}.conf
        2. Rollback package: rpm -Uvh --force {{ backup_dir }}/{{ package_name }}-*.rpm
        3. Revert VM snapshot
        4. Fix config manually: {{ package_name }} -t

        Backup Available: Yes
        Backup Location: {{ backup_dir }}/
        Config Backup: {{ backup_dir }}/{{ package_name }}.conf.backup

      dest: "/tmp/rhel_patching_validate_fail_{{ inventory_hostname }}.txt"

  - name: Display recovery instructions
    ansible.builtin.debug:
      msg:
      - "=========================================="
      - "  ROLLBACK INSTRUCTIONS"

      - "Option 1: Rollback package completely"
      - "  rpm -Uvh --force {{ backup_dir }}/{{ package_name }}-*.rpm"
      - "  cp {{ backup_dir }}/{{ package_name }}.conf.backup /etc/{{ package_name }}/{{ package_name }}.conf"
      - "  systemctl start {{ package_name }}"
      - ""
      - "Option 2: Revert VM snapshot"
      - "  virsh snapshot-revert <domain> <snapshot>"
      - ""
      - "Option 3: Manual recovery"
      - "  Investigate service logs: journalctl -u {{ package_name }} -n 50"
      - "  Test config: {{ package_name }} -t"
      - "  Fix errors in /etc/{{ package_name }}/{{ package_name }}.conf"
      - "=========================================="

  - name: Log validation failure
    ansible.builtin.lineinfile:
      path: "{{ log_file }}"
      line: "{{ ansible_date_time.iso8601 }} - Validation failed: Service {{ service_name }} is {{ actual_state }} after patching to {{ installed_version }}"
      create: true

  - name: Stop execution
    ansible.builtin.fail:
      msg: "Stopping execution: Post-patch validation failed - service not running despite successful package installation"

# ========================================
# CODE BELOW SHOULD NOT EXECUTE
# ========================================
- name: Warning - validation failed
  ansible.builtin.debug:
    msg: "⚠ WARNING: Execution stopped due to validation failure"
  when: false

- name: This should not execute
  ansible.builtin.debug:
    msg: "This code should never be reached"
  when: false
