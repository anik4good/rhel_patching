# ========================================
# FAILURE SCENARIOS (use 9.4 as default)
# ========================================

- name: RHEL OS Patching POC - Pre-Check Failure (TC-OS-002)
  hosts: all
  become: true
  serial: 1
  vars:
    current_version: "9.0"
    target_version: "9.4"
    repo_type: "{{ repo_type_input | default('cdn') }}"
    disk_threshold: 90
    simulate_disk_full: true
    simulated_disk_usage: 95
    log_file: /var/log/rhel_os_upgrade_precheck_fail.log
  tasks:
    - ansible.builtin.include_tasks: scenarios/precheck_fail.yml
  tags:
    - precheck_fail
    - all_scenarios

- name: RHEL OS Patching POC - Upgrade Failure (TC-OS-003)
  hosts: all
  become: true
  serial: 1
  vars:
    current_version: "9.0"
    target_version: "9.4"
    repo_type: "{{ repo_type_input | default('cdn') }}"
    disk_threshold: 90
    corrupt_repo: true
    log_file: /var/log/rhel_os_upgrade_fail.log
  tasks:
    - ansible.builtin.include_tasks: scenarios/upgrade_fail.yml
  tags:
    - upgrade_fail
    - all_scenarios

- name: RHEL OS Patching POC - Post-Patch Validation Failure (TC-OS-004)
  hosts: all
  become: true
  serial: 1
  vars:
    current_version: "9.0"
