---
# RHEL OS Version Patching POC - Main Playbook
# Demonstrates OS version upgrade with failure handling
# Supports 3 repository options: cdn, satellite, jump
# Usage: ansible-playbook -i inventory site.yml --tags <scenario>
#
# Repository selection via variable:
#   -e "repo_type=cdn"          : Use Red Hat CDN (default)
#   -e "repo_type=satellite"    : Use Satellite (already configured)
#   -e "repo_type=jump"         : Use Jump Server (already configured)
#
# Version selection via tags:
#   - success (v9.4 default): Upgrade to 9.4
#   - success_v9.5: Upgrade to 9.5
#   - success_v9.6: Upgrade to 9.6
#   - success_v9.7: Upgrade to 9.7

# ========================================
# SUCCESS SCENARIOS - Different Versions
# ========================================

- name: RHEL OS Patching POC - Success to 9.4 (Default)
  hosts: all
  become: true
  serial: 1
  max_fail_percentage: 0
  vars:
    current_version: "9.0"
    target_version: "9.4"
    repo_type: "{{ repo_type | default('cdn') }}"
    disk_threshold: 90
    reboot_timeout: 600
    pre_reboot_delay: 10
    log_file: /var/log/rhel_os_upgrade_9.4.log
    summary_file: /tmp/rhel_os_upgrade_summary_{{ inventory_hostname }}_9.4.txt
  tasks:
    - ansible.builtin.include_tasks: scenarios/success.yml
  tags:
    - success
    - success_v9.4
    - all_scenarios

