[defaults]
host_key_checking = False
retry_files_enabled = False
stdout_callback = yaml
bin_ansible_callbacks = True
display_skipped_hosts = False
remote_user = root
inventory = ./inventory
#enable Timer for debug
#callbacks_enabled = community.general.timestamp, ansible.posix.timer, ansible.posix.profile_tasks

[privilege_escalation]
become=True
become_method=sudo
become_user=root
become_ask_pass=False

