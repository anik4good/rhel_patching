---
# Test HTML report generation with mock data
# This tests the template without running the full upgrade

- name: Test HTML Report Generation
  hosts: rhel_os_poc_servers
  become: true
  vars:
    # Mock data for testing the template
    target_version: "9.4"
  tasks:
    - name: Generate HTML report with mock data
      ansible.builtin.template:
        src: templates/report.html.j2
        dest: "/tmp/test_rhel_os_patching_report.html"
        mode: '0644'
      vars:
        scenario_name: "success"
        patch_status: "success"
        version_before: "Red Hat Enterprise Linux release 9.0.0"
        version_after: "Red Hat Enterprise Linux release 9.4.0"
        kernel_before: "5.14.0-284.11.1.el9_2.x86_64"
        kernel_after: "5.14.0-427.18.1.el9_4.x86_64"
        reboot_required: true
        # target_version is now inherited from play vars - no recursive definition!

    - name: Fetch the report to local machine
      ansible.builtin.fetch:
        src: "/tmp/test_rhel_os_patching_report.html"
        dest: "/tmp/test_rhel_os_patching_report_{{ inventory_hostname }}.html"
        flat: true

    - name: Display report location
      ansible.builtin.debug:
        msg: "✓ Test HTML report generated on {{ inventory_hostname }}: /tmp/test_rhel_os_patching_report.html and downloaded to /tmp/test_rhel_os_patching_report_{{ inventory_hostname }}.html"
